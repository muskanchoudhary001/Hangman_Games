<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game JavaScript</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts/word-list.js" defer></script>
    <script src="scripts/script.js" defer></script>
</head>

<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true">H</span>
                <div class="brand-text">
                    <div class="brand-title">Hangman</div>
                    <div class="brand-subtitle">Guess the word before time runs out (of guesses).</div>
                </div>
            </div>
        </header>

    <div class="game-modal">
        <div class="content">
            <div class="confetti" aria-hidden="true"></div>
            <div class="result-emoji" aria-hidden="true">😵‍💫</div>
            <img src="images/hangman-6.svg" alt="Result">
            <h4>Game Over!</h4>
            <p>The correct word was: <b>rainbow</b></p>
            <button class="play-again">Play Again</button>
        </div>
    </div>
    <div class="container">
        <div class="hangman-box">
            <img src="images/hangman-0.svg" draggable="false" alt="Hangman">
            <h1>Hangman Game</h1>
        </div>
        <div class="game-box">
            <ul class="word-display"></ul>
            <h4 class="hint-text">Hint: <b></b></h4>
            <h4 class="guesses-text">Incorrect guesses: <b></b></h4>
            <div class="guess-meter" aria-hidden="true">
                <div class="guess-meter-fill"></div>
            </div>
            <div class="keyboard"></div>
        </div>
    </div>
    </div>
</body>

</html>
